<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌀 Psychedelic Whale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .whale-container {
      position: relative;
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }
    h1 {
      color: #fff;
      font-size: clamp(2rem, 8vw, 5rem);
      text-shadow: 
        0 0 10px #f0f,
        0 0 20px #f0f,
        0 0 40px #0ff,
        0 0 80px #0ff;
      animation: glow 2s ease-in-out infinite alternate;
      letter-spacing: 0.2em;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #f0f, 0 0 20px #f0f, 0 0 40px #0ff, 0 0 80px #0ff; }
      to { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #f0f, 0 0 120px #f0f; }
    }
    .subtitle {
      color: #fff;
      margin-top: 1rem;
      font-size: 1.2rem;
      opacity: 0.8;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="psychedelic"></canvas>
  <div class="whale-container">
    <h1>🐋 WHALE 🐋</h1>
    <p class="subtitle">riding the cosmic waves 🌊✨</p>
  </div>

  <script>
    const canvas = document.getElementById('psychedelic');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let time = 0;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    function draw() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, width, height);
      
      time += 0.01;
      
      const centerX = width / 2;
      const centerY = height / 2;
      
      // Draw swirling mandala patterns
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2 + time;
        const radius = 100 + Math.sin(time * 2 + i) * 50;
        
        const x = centerX + Math.cos(angle) * radius;
        const y = centerY + Math.sin(angle) * radius;
        
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, 80);
        gradient.addColorStop(0, `hsla(${(time * 50 + i * 30) % 360}, 100%, 60%, 0.8)`);
        gradient.addColorStop(0.5, `hsla(${(time * 50 + i * 30 + 60) % 360}, 100%, 50%, 0.4)`);
        gradient.addColorStop(1, 'transparent');
        
        ctx.beginPath();
        ctx.arc(x, y, 80, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      }
      
      // Floating particles
      for (let i = 0; i < 50; i++) {
        const x = (Math.sin(time + i * 0.5) * 0.5 + 0.5) * width;
        const y = (Math.cos(time * 0.7 + i * 0.3) * 0.5 + 0.5) * height;
        const size = 2 + Math.sin(time * 3 + i) * 2;
        
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${(time * 100 + i * 20) % 360}, 100%, 70%, 0.6)`;
        ctx.fill();
      }
      
      // Spiral arms
      for (let arm = 0; arm < 6; arm++) {
        ctx.beginPath();
        for (let t = 0; t < 100; t++) {
          const angle = t * 0.1 + time + (arm * Math.PI / 3);
          const r = t * 3;
          const x = centerX + Math.cos(angle) * r;
          const y = centerY + Math.sin(angle) * r;
          
          if (t === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `hsla(${(arm * 60 + time * 30) % 360}, 100%, 60%, 0.3)`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      
      requestAnimationFrame(draw);
    }
    
    draw();
  </script>
</body>
</html>
